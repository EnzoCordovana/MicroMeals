openapi: 3.0.3
info:
  title: API Menus
  description: >
    Gestion des menus compos횄짤s par les utilisateurs 횄  partir des plats disponibles.
    Ce composant consomme l'API Plats et Utilisateurs pour valider les plats
    et les cr횄짤ateurs de menus (sans dupliquer leurs donn횄짤es).
    Consomm횄짤e par le composant Commandes et l'IHM.
  version: 1.0.0

servers:
  - url: http://localhost:8081/menus/api
    description: Serveur de d횄짤veloppement local

tags:
  - name: Menus
    description: Op횄짤rations CRUD sur les menus

paths:
  /menus:
    get:
      tags: [Menus]
      summary: Lister tous les menus
      operationId: getAllMenus
      responses:
        "200":
          description: Liste des menus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Menu"
              example:
                - id: 1
                  nom: "Menu Provence"
                  createurId: 2
                  createurNom: "Martin"
                  dateCreation: "2025-03-10"
                  dateMiseAJour: "2025-03-12"
                  plats:
                    - id: 1
                      nom: "Salade ni횄짠oise"
                      prix: 8.50
                    - id: 3
                      nom: "Gratin dauphinois"
                      prix: 9.00
                  prixTotal: 17.50

    post:
      tags: [Menus]
      summary: Cr횄짤er un nouveau menu
      operationId: createMenu
      description: >
        Cr횄짤e un menu vide. Les plats peuvent 횄짧tre ajout횄짤s ensuite via
        PUT /menus/{id}/plats/{platId}.
        Le composant appelle l'API Plats et Utilisateurs pour v횄짤rifier
        que le cr횄짤ateur existe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuInput"
            example:
              nom: "Menu Soleil"
              createurId: 2
      responses:
        "201":
          description: Menu cr횄짤횄짤
          headers:
            Location:
              schema:
                type: string
                example: /menus/2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Menu"
        "400":
          description: Donn횄짤es invalides
        "404":
          description: Cr횄짤ateur introuvable (v횄짤rifi횄짤 via API Plats et Utilisateurs)

  /menus/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"

    get:
      tags: [Menus]
      summary: Obtenir un menu par son identifiant
      operationId: getMenuById
      responses:
        "200":
          description: Menu trouv횄짤
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Menu"
        "404":
          description: Menu introuvable

    put:
      tags: [Menus]
      summary: Renommer un menu (mettre 횄  jour ses m횄짤tadonn횄짤es)
      operationId: updateMenu
      description: >
        Met 횄  jour le nom du menu. La date de mise 횄  jour est calcul횄짤e
        automatiquement c횄쨈t횄짤 serveur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuInput"
      responses:
        "200":
          description: Menu mis 횄  jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Menu"
        "404":
          description: Menu introuvable

    delete:
      tags: [Menus]
      summary: Supprimer un menu
      operationId: deleteMenu
      responses:
        "204":
          description: Menu supprim횄짤
        "404":
          description: Menu introuvable

  /menus/{id}/plats/{platId}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - name: platId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1

    put:
      tags: [Menus]
      summary: Ajouter un plat au menu
      operationId: addPlatToMenu
      description: >
        Ajoute le plat identifi횄짤 par platId au menu.
        Le composant appelle l'API Plats et Utilisateurs pour v횄짤rifier
        que le plat existe avant de l'ajouter.
      responses:
        "200":
          description: Plat ajout횄짤, menu mis 횄  jour retourn횄짤
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Menu"
        "404":
          description: Menu ou plat introuvable
        "409":
          description: Plat d횄짤j횄  pr횄짤sent dans ce menu

    delete:
      tags: [Menus]
      summary: Retirer un plat du menu
      operationId: removePlatFromMenu
      responses:
        "200":
          description: Plat retir횄짤, menu mis 횄  jour retourn횄짤
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Menu"
        "404":
          description: Menu introuvable ou plat absent du menu

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    PlatResume:
      description: >
        Repr횄짤sentation all횄짤g횄짤e d'un plat, stock횄짤e dans la BDD Menus.
        Seul l'id est conserv횄짤 c횄쨈t횄짤 Menus ; nom et prix sont r횄짤cup횄짤r횄짤s
        via l'API Plats et Utilisateurs 횄  la demande (ou mis en cache).
      type: object
      properties:
        id:
          type: integer
          example: 1
        nom:
          type: string
          readOnly: true
          example: "Salade ni횄짠oise"
        prix:
          type: number
          format: double
          readOnly: true
          example: 8.50

    Menu:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        nom:
          type: string
          example: "Menu Provence"
        createurId:
          type: integer
          description: Identifiant de l'abonn횄짤 cr횄짤ateur (FK vers API Plats et Utilisateurs)
          example: 2
        createurNom:
          type: string
          readOnly: true
          description: Nom r횄짤cup횄짤r횄짤 via l'API Plats et Utilisateurs
          example: "Martin"
        dateCreation:
          type: string
          format: date
          readOnly: true
          example: "2025-03-10"
        dateMiseAJour:
          type: string
          format: date
          readOnly: true
          example: "2025-03-12"
        plats:
          type: array
          items:
            $ref: "#/components/schemas/PlatResume"
        prixTotal:
          type: number
          format: double
          readOnly: true
          description: Somme des prix des plats, calcul횄짤e c횄쨈t횄짤 serveur
          example: 17.50

    MenuInput:
      type: object
      required: [nom, createurId]
      properties:
        nom:
          type: string
          example: "Menu Soleil"
        createurId:
          type: integer
          example: 2
